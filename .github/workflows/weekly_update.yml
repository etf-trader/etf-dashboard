name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 21 * * *'      # 5PM EDT (summer)
    - cron: '0 22 * * *'      # 5PM EST (winter)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Determine NY time context
        id: nytime
        run: |
          NY_HOUR=$(TZ="America/New_York" date +%H)
          NY_DOW=$(TZ="America/New_York" date +%u)   # 1=Mon ... 6=Sat, 7=Sun
          SCHEDULE="${{ github.event.schedule }}"

          # Only let each cron line proceed if NY hour is in a tolerant window
          # around its intended target, so GitHub Actions delays don't cause skips.
          SHOULD_RUN=false

          if [ "$SCHEDULE" == "0 21 * * *" ]; then
            # Intended for 5PM EDT; accept 17-18 to absorb delay/DST drift
            if [ "$NY_HOUR" -ge 17 ] && [ "$NY_HOUR" -le 18 ]; then
              SHOULD_RUN=true
            fi
          elif [ "$SCHEDULE" == "0 22 * * *" ]; then
            # Intended for 5PM EST; accept 17-18 as well
            if [ "$NY_HOUR" -ge 17 ] && [ "$NY_HOUR" -le 18 ]; then
              SHOULD_RUN=true
            fi
          else
            # workflow_dispatch or manual run: always allow
            SHOULD_RUN=true
          fi

          if [ "$SHOULD_RUN" != "true" ]; then
            echo "NY hour is $NY_HOUR, schedule '$SCHEDULE' not in target window. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_financials=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

          if [ "$NY_DOW" == "6" ]; then
            echo "run_financials=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_financials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.nytime.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.nytime.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.nytime.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run build_all
        if: steps.nytime.outputs.should_run == 'true'
        run: python build_all.py

      - name: Run build_financials
        if: steps.nytime.outputs.should_run == 'true' && steps.nytime.outputs.run_financials == 'true'
        run: python build_financials.py

      - name: Commit & Push
        if: steps.nytime.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_analysis/
          git diff --cached --quiet || git commit -m "auto: update dashboard $(date '+%Y-%m-%d %H:%M KST')"
          git pull --rebase --autostash origin main
          git push
